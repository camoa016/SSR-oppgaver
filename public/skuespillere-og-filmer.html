<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <ul id="skuespillere-og-filmer">
        <li>Henter data...</li>
    </ul>
    <script>
        fetch('/skuespillere-og-filmer-json')
            .then(response => response.json())
            .then(data => {
                let list = document.getElementById('skuespillere-og-filmer');
                list.innerHTML = '';
                data.forEach(row => {
                    let li = document.createElement('li');
                    li.textContent = row.skuespiller + '--' + row.film;
                    list.appendChild(li);

                });
            });
    </script>
</body>

</html>
