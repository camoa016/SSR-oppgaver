<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- skuespillere -->
    <p>
        <input id="skuespiller-input" placeholder="Navn på skuespiller" type="text">
        <button id="ny-skuespiller">Legg inn ny skuespiller</button>
    </p>

    <ul id="skuespillere">
        <li>Henter data...</li>
    </ul>

    <!-- filmer -->
    <p>
        <input id="filmer-input" placeholder="Navn på film" type="text">
        <button id="ny-film">Legg inn ny film</button>
    </p>

    <ul id="filmer">
        <li>Henter data...</li>
    </ul>

    <!-- script -->
    <script type="module">
        // SKUESPILLERE
        document.getElementById('ny-skuespiller')
            .addEventListener('click', async () => {
                const inputElement = document.getElementById('skuespiller-input');
                const navn = inputElement.value;
                const data = { navn: navn };
                await fetch('http://localhost:3002/skuespillere', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                inputElement.value = '';
                await hentSkuespillere()
            });

        // HENT SKUESPILLERE FUNCTION
        async function hentSkuespillere() {
            const resp = await fetch('http://localhost:3002/skuespillere')
            const data = await resp.json()
            const list = document.getElementById('skuespillere');
            list.innerHTML = '';
            data.forEach(row => {
                let li = document.createElement('li');
                li.textContent = row.navn;
                list.appendChild(li);
            });
        }

        await hentSkuespillere()

        // FILMER
        document.getElementById('ny-film')
            .addEventListener('click', async () => {
                const inputElement = document.getElementById('filmer-input');
                const tittel = inputElement.value;
                const data = { tittel: tittel };
                await fetch('http://localhost:3002/filmer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                inputElement.value = '';
                await hentFilmer()
            });

        // HENT FILMER FUNCTION
        async function hentFilmer() {
            const resp = await fetch('http://localhost:3002/filmer')
            const data = await resp.json()
            const list = document.getElementById('filmer');
            list.innerHTML = '';
            data.forEach(row => {
                let li = document.createElement('li');
                li.textContent = row.tittel;
                list.appendChild(li);
            });
        }

        await hentFilmer()
    </script>
</body>

</html>
